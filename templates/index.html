<!DOCTYPE html>
<html>
<head>
    <title>Titanic Survival Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🚢 Titanic Survival Prediction</h1>

    <p class="description">
        Predict whether a passenger would survive the Titanic disaster using a Machine Learning classification model.
    </p>

    <form action="/predict" method="post">

        <label>Passenger Class</label>
        <input type="number" name="pclass" required>

        <label>Sex</label>
        <select name="sex">
            <option value="0">Male</option>
            <option value="1">Female</option>
        </select>

        <label>Age</label>
        <input type="number" step="0.1" name="age" required>

        <label>Siblings/Spouses</label>
        <input type="number" name="sibsp" required>

        <label>Parents/Children</label>
        <input type="number" name="parch" required>

        <label>Fare</label>
        <input type="number" step="0.01" name="fare" required>

        <label>Embarked</label>
        <select name="embarked">
            <option value="0">Southampton (S)</option>
            <option value="1">Cherbourg (C)</option>
            <option value="2">Queenstown (Q)</option>
        </select>

        <button type="submit">
            Predict Survival
        </button>

    </form>

</div>

</body>
</html>
